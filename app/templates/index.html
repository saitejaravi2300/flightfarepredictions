<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flight Fare Predictor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; background: #f6f8fc; }
    .card { max-width: 900px; margin: auto; background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    form { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    label { display: grid; gap: 0.25rem; font-weight: 600; }
    input, select { padding: 0.6rem; border: 1px solid #cdd5df; border-radius: 8px; }
    button { grid-column: 1 / -1; padding: 0.7rem 1rem; border: none; background: #2563eb; color: white; border-radius: 8px; cursor: pointer; }
    .result { margin-top: 1rem; padding: 1rem; border-radius: 10px; background: #eff6ff; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Flight Fare Predictor</h1>
    <p>Enter the flight details below to estimate the ticket price.</p>
    <form method="post">
      <label>Airline <input name="airline" value="Jet Airways" required /></label>
      <label>Date of Journey <input type="date" name="date_of_journey" required /></label>
      <label>Source <input name="source" value="Delhi" required /></label>
      <label>Destination <input name="destination" value="Banglore" required /></label>
      <label>Total Stops <input name="total_stops" value="1" required /></label>
      <label>Departure Time <input type="time" name="dep_time" required /></label>
      <label>Arrival Time <input type="time" name="arrival_time" required /></label>
      <label>Duration <input name="duration" value="2h 30m" required /></label>
      <label>Route <input name="route" value="Delhi→Banglore" /></label>
      <label>Additional Info <input name="additional_info" value="No info" /></label>
      <button type="submit">Predict Fare</button>
    </form>

    {% if prediction is not none %}
      <div class="result">
        <strong>Estimated Price:</strong> ₹{{ prediction }}
      </div>
    {% endif %}
  </div>
</body>
</html>
